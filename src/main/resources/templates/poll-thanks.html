<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<head>
    <title>Thank You - Calendly Clone</title>
</head>
<body>
<main class="main-content" style="text-align: center; padding: 6rem 2rem;">
    <div class="success-icon" style="font-size: 5rem; color: var(--success-color); margin-bottom: 1.5rem; background: #e8f5e9; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">✓</div>
    <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Votes Recorded!</h1>
    <p style="color: var(--text-gray); margin-bottom: 3rem; font-size: 1.1rem; max-width: 500px; margin-left: auto; margin-right: auto;">
        We've sent your preferences to the host. You'll receive a calendar invitation and confirmation email once the final meeting time is selected.
    </p>
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="/" class="btn btn-outline">Back to Home</a>
        <a href="/login" class="btn btn-primary">Sign up for free</a>
    </div>
</main>
</body>
</html>
